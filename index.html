<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PPC Bare Act Engine</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="app-header">
    <div style="text-align: center; padding: 5px 0; font-size: 0.9rem; font-weight: bold; color: #ffffff; background: #121212;">
      PPC 1860 Bare Act
    </div>

    <div class="toggle-container" style="max-width: 500px;">
      <button id="btn-linear" class="toggle-btn active">Linear</button>
      <button id="btn-offences" class="toggle-btn">Offences</button>
      <button id="btn-map" class="toggle-btn">Map</button>
    </div>

    <div class="search-wrapper">
      <input type="text" id="search-bar" placeholder="Enter section number, chapter, or keyword..." autocomplete="off">
      <button id="clear-search" class="hidden">×</button>
    </div>

    <div id="chapter-pills" class="pill-track"></div>
  </header>

  <main id="statute-container" class="content-canvas"></main>

  <div id="footnote-sheet" class="bottom-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-content">
      <p id="footnote-text"></p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
