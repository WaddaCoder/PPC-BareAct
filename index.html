<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PPC Bare Act Engine</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Sticky Top Navigation & TOC Module -->
  <header class="app-header">
    <!-- NEW TITLE ADDITION -->
    <div style="text-align: center; padding: 5px 0; font-size: 0.9rem; font-weight: bold; color: #555; background: #eee;">
      PPC 1860 Bare Act
    </div>

    <div class="toggle-container">
      <button id="btn-linear" class="toggle-btn active">Linear Mode</button>
      <button id="btn-offences" class="toggle-btn">Offences Only</button>
    </div>

    <!-- Unified Command Input Bar -->
    <div class="search-wrapper">
      <input type="text" id="search-bar" placeholder="Enter section number, chapter, or keyword..." autocomplete="off">
      <button id="clear-search" class="hidden">×</button>
    </div>

    <!-- Horizontal Thumb-Scrollable TOC Tabs -->
    <div id="chapter-pills" class="pill-track">
      <!-- Generated dynamically by JS -->
    </div>
  </header>

  <!-- Dynamic Content Area -->
  <main id="statute-container" class="content-canvas"></main>

  <!-- Interactive Historical Overlay Sheet -->
  <div id="footnote-sheet" class="bottom-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-content">
      <p id="footnote-text"></p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
