<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <title>Atlas</title>

    <meta name="theme-color" content="#132238">
    <meta name="description"
          content="Atlas - Read Less. Understand More.">

    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="assets/icon-192.png">

    <link rel="stylesheet" href="atlas.css">
</head>

<body>

<div id="app">

    <!-- Splash Screen -->

    <section id="splash" class="screen active">

        <div class="logo">

            <div class="logo-circle">

    <img
        src="assets/logo.svg"
        alt="Atlas Logo"
        class="logo-image">

            </div>

            <h1>ATLAS</h1>

            <p class="tagline">
                Read Less.<br>
                Understand More.
            </p>

        </div>

    </section>

    <!-- Home Screen -->

    <section id="home" class="screen">

        <header class="header">

            <h2>Pakistan Penal Code</h2>

            <p class="subtitle">
                Legal Intelligence Atlas
            </p>

        </header>

        <main id="homeCards" class="card-grid">

            <!-- Filled by atlas.js -->

        </main>

    </section>

    <!-- Detail Screen -->

    <section id="detail" class="screen">

        <header class="header">

            <button
                id="backButton"
                class="back-button">

                ← Back

            </button>

            <h2 id="detailTitle"></h2>

        </header>

        <main id="detailContent">

        </main>

    </section>

</div>

<!-- Bottom Navigation -->

<nav id="bottomNav">

    <button data-screen="home">

        <span>🏠</span>

        <small>Home</small>

    </button>

    <button data-screen="patterns">

        <span>🧠</span>

        <small>Patterns</small>

    </button>

    <button data-screen="explore">

        <span>🕸</span>

        <small>Explore</small>

    </button>

    <button data-screen="search">

        <span>🔍</span>

        <small>Search</small>

    </button>

    <button data-screen="saved">

        <span>⭐</span>

        <small>My Atlas</small>

    </button>

</nav>

<script src="knowledge.js"></script>
<script src="atlas.js"></script>

<script>

if ('serviceWorker' in navigator) {

    window.addEventListener('load', () => {

        navigator.serviceWorker
            .register('service-worker.js');

    });

}

</script>

</body>
</html>
